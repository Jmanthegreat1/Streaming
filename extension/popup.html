<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root { --accent:#4f8cff; --bg:#11151d; --panel:#1b212c; --text:#f3f5fa; --dim:#94a0b4; }
  body { width:290px; margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family: system-ui, "Segoe UI", sans-serif; }
  h1 { font-size:15px; margin:0 0 12px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin:11px 0; }
  label { font-size:13px; color:var(--dim); }
  select, input[type=text] { background:var(--panel); color:var(--text); border:1px solid #2c3543;
    border-radius:8px; padding:8px 10px; font:inherit; font-size:13px; }
  select { min-width:140px; }
  input[type=text] { width:100%; box-sizing:border-box; margin-top:6px; }

  .switch { position:relative; width:46px; height:26px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:#3a4453; border-radius:26px; cursor:pointer; transition:.2s; }
  .slider::before { content:""; position:absolute; height:20px; width:20px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .slider { background:var(--accent); }
  input:checked + .slider::before { transform:translateX(20px); }

  button { width:100%; margin-top:8px; padding:11px; border:0; border-radius:8px; cursor:pointer;
    font:inherit; font-size:13px; font-weight:600; }
  .primary { background:var(--accent); color:#fff; }
  .ghost { background:var(--panel); color:var(--text); border:1px solid #2c3543; }
  .full { font-size:12px; color:var(--dim); display:block; margin-top:14px; }
  .hint { font-size:11px; color:var(--dim); line-height:1.5; margin-top:12px; }
  .sep { border:0; border-top:1px solid #232a37; margin:14px 0 0; }

  /* Big on/off button */
  .power { display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; margin:0 0 16px; padding:16px; border:0; border-radius:12px;
    font-size:16px; font-weight:700; cursor:pointer; transition:.15s; }
  .power .dot { width:12px; height:12px; border-radius:50%; background:#7a8696; transition:.15s; }
  .power.off { background:var(--panel); color:var(--dim); border:1px solid #2c3543; }
  .power.on  { background:#16331f; color:#56e08a; box-shadow:inset 0 0 0 1px #2c8a4e; }
  .power.on .dot { background:#3ddc7e; box-shadow:0 0 8px #3ddc7e; }
</style>
</head>
<body>
  <h1>Live Subtitle Translator</h1>

  <button id="power" class="power off">
    <span class="dot"></span><span id="powerLabel">Turn ON</span>
  </button>

  <div class="row">
    <label for="mode">Read subtitles from</label>
    <select id="mode">
      <option value="ocr">The screen (OCR)</option>
      <option value="text">Page text</option>
    </select>
  </div>

  <div class="row">
    <label for="engine">OCR runs</label>
    <select id="engine">
      <option value="local">On your laptop (fast)</option>
      <option value="server">On the server</option>
    </select>
  </div>

  <div class="row">
    <label for="target">Translate to</label>
    <select id="target"></select>
  </div>

  <!-- OCR controls -->
  <div id="ocrControls">
    <button class="primary" id="selectArea">Select subtitle area</button>
    <div class="hint">Turn on, play your show, then press this and drag a box over the
      Hebrew subtitles. The English appears just above them.</div>
  </div>

  <!-- TEXT controls -->
  <div id="textControls" style="display:none">
    <button class="primary" id="teach">Click to pick the subtitle</button>
    <div class="hint">Press this, then click the subtitle text on the page once.</div>
  </div>

  <button class="ghost" id="clear">Reset selection</button>

  <hr class="sep" />
  <label class="full" for="backendUrl">Render backend URL <b id="req" style="color:#ff8f8f"></b></label>
  <input type="text" id="backendUrl" placeholder="https://your-app.onrender.com" />
  <div class="hint" id="backendHint">Required for screen (OCR) mode — paste your Render URL here.</div>

  <script src="popup.js"></script>
</body>
</html>
