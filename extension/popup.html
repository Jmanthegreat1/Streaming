<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root { --accent:#4f8cff; --bg:#11151d; --panel:#1b212c; --text:#f3f5fa; --dim:#94a0b4; }
  body { width:280px; margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family: system-ui, "Segoe UI", sans-serif; }
  h1 { font-size:15px; margin:0 0 14px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin:12px 0; }
  label { font-size:13px; color:var(--dim); }
  select, input[type=text] { background:var(--panel); color:var(--text); border:1px solid #2c3543;
    border-radius:8px; padding:8px 10px; font:inherit; font-size:13px; }
  select { min-width:130px; }
  input[type=text] { width:100%; box-sizing:border-box; margin-top:6px; }

  /* toggle switch */
  .switch { position:relative; width:46px; height:26px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:#3a4453; border-radius:26px; cursor:pointer;
    transition:.2s; }
  .slider::before { content:""; position:absolute; height:20px; width:20px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .slider { background:var(--accent); }
  input:checked + .slider::before { transform:translateX(20px); }

  .full { font-size:13px; color:var(--dim); display:block; margin-top:14px; }
  button { width:100%; margin-top:8px; padding:10px; border:0; border-radius:8px; cursor:pointer;
    font:inherit; font-size:13px; font-weight:600; }
  .primary { background:var(--accent); color:#fff; }
  .ghost { background:var(--panel); color:var(--text); border:1px solid #2c3543; }
  .hint { font-size:11px; color:var(--dim); line-height:1.5; margin-top:14px; }
  details summary { font-size:12px; color:var(--dim); cursor:pointer; margin-top:14px; }
</style>
</head>
<body>
  <h1>Live Subtitle Translator</h1>

  <div class="row">
    <label for="enabled">Translation</label>
    <span class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </span>
  </div>

  <div class="row">
    <label for="target">Translate to</label>
    <select id="target"></select>
  </div>

  <div class="row">
    <label for="showOriginal">Show original too</label>
    <span class="switch">
      <input type="checkbox" id="showOriginal" />
      <span class="slider"></span>
    </span>
  </div>

  <button class="primary" id="teach">Click to pick the subtitle</button>
  <button class="ghost" id="clear">Reset to automatic</button>

  <div class="hint">
    Turn it on, then play your show. If English doesn't appear by itself, press
    <b>Click to pick the subtitle</b> and tap the Hebrew text once.
  </div>

  <details>
    <summary>Advanced (translation server)</summary>
    <label class="full" for="backendUrl">Render backend URL (optional)</label>
    <input type="text" id="backendUrl" placeholder="https://your-app.onrender.com" />
    <div class="hint">Leave blank to translate directly. Paste your Render URL here
      once deployed.</div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
